version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'maintenance'
      - 'dependencies'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      minor-and-patch:
        patterns: ['*']
        update-types: [patch, minor]
    open-pull-requests-limit: 1

  - package-ecosystem: 'npm'
