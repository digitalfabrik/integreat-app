parameters:
  build_config_name:
    type: enum
    enum: [integreat, malte, integreat-test-cms, malte-test-cms, aschaffenburg, obdach]
    default: integreat
docker:
  - image: cimg/node:22.21.1
resource_class: medium
environment:
  TOTAL_CPUS: 2 # For resource_class medium
shell: /bin/bash -eo pipefail
steps:
  - checkout
  - restore_yarn_cache
  - prepare_workspace
  - restore_environment_variables
  - run:
      name: << parameters.build_config_name >> build
      command: yarn workspace web build:<< parameters.build_config_name >>
  - store_artifacts:
      name: Store output of bundle analyzer
      path: web/reports/bundle
  - run:
      name: Check build
      command: yarn workspace web check:build
  - run:
      name: Create tarball
      command: tar -czf << parameters.build_config_name >>.tar.gz ./<< parameters.build_config_name >>
      working_directory: web/build
  - store_artifacts:
      path: web/build/<< parameters.build_config_name >>.tar.gz
  - persist_to_workspace:
      root: web
      paths:
        - build/<<parameters.build_config_name >>
  - notify
