description: Restores and saves the node_modules directories of the tools package.
steps:
  - run:
      name: Enable Corepack
      command: |
        corepack enable --install-directory "$HOME/bin"
        export PATH="$HOME/bin:$PATH"
  - restore_cache:
      name: Restore Yarn Tools Package Cache
      keys:
        - 3-yarn-{{ arch }}-{{ checksum "tools/yarn.lock" }}-{{ checksum "tools/package.json" }}
  - run:
      name: Yarn tools
      # corepack prefix is necessary on macos
      # https://github.com/nodejs/corepack/issues/507
      command: corepack yarn --immutable
      working_directory: tools
  - save_cache:
      name: Save Yarn Tools Package Cache
      key: 3-yarn-{{ arch }}-{{ checksum "tools/yarn.lock" }}-{{ checksum "tools/package.json" }}
      paths:
        - .yarn/cache
        - tools/node_modules
